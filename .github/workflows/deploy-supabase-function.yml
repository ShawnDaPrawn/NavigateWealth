# Deploy the Navigate Wealth Edge Function to Supabase on push to main.
#
# One-time setup (repo → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN — create at https://supabase.com/dashboard/account/tokens
#
# Project ref is fixed in supabase/config.toml (vpjmdsltwrnpefzcgdmz).

name: Deploy Supabase Edge Function

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/supabase/functions/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-function.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Skip deploy when token is missing
        if: ${{ env.SUPABASE_ACCESS_TOKEN == '' }}
        run: echo "::warning::SUPABASE_ACCESS_TOKEN is not set; skipping Supabase Edge Function deploy."

      - name: Deploy make-server-91ed8379
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' }}
        run: |
          supabase --version
          supabase functions deploy make-server-91ed8379 --project-ref vpjmdsltwrnpefzcgdmz --use-api --workdir .
