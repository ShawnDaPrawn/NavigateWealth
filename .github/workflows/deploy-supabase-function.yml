# Deploy the Navigate Wealth Edge Function to Supabase on push to main.
#
# One-time setup (repo → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN — create at https://supabase.com/dashboard/account/tokens
#
# Project ref is fixed in supabase/config.toml (vpjmdsltwrnpefzcgdmz).

name: Deploy Supabase Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'src/supabase/functions/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-function.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check for Supabase token
        id: supabase_token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN is not set. Skipping Supabase function deployment."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy make-server-91ed8379
        if: steps.supabase_token.outputs.has_token == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy make-server-91ed8379 --project-ref vpjmdsltwrnpefzcgdmz
