# Deploy the Navigate Wealth Edge Function to Supabase on push to main.
#
# One-time setup (repo → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN — create at https://supabase.com/dashboard/account/tokens
#
# Project ref is fixed in supabase/config.toml (vpjmdsltwrnpefzcgdmz).

# Trigger note: this workflow can be rerun via workflow_dispatch.
# CI trigger marker: token-variable verification.
name: Deploy Supabase Edge Function

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/supabase/functions/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-function.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy make-server-91ed8379
        env:
          SUPABASE_ACCESS_TOKEN_SECRET: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_ACCESS_TOKEN_VAR: ${{ vars.SUPABASE_ACCESS_TOKEN }}
        run: |
          TOKEN="${SUPABASE_ACCESS_TOKEN_SECRET:-$SUPABASE_ACCESS_TOKEN_VAR}"
          if [ -z "$TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set. Add it under Repository secrets or Repository variables."
            exit 1
          fi
          export SUPABASE_ACCESS_TOKEN="$TOKEN"
          supabase --version
          status=0
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt of 3"
            if [ "$attempt" -eq 3 ]; then
              supabase --debug functions deploy make-server-91ed8379 --project-ref vpjmdsltwrnpefzcgdmz --use-api --workdir . && exit 0
            else
              supabase functions deploy make-server-91ed8379 --project-ref vpjmdsltwrnpefzcgdmz --use-api --workdir . && exit 0
            fi
            status=$?
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 15))
            fi
          done
          echo "::error::Supabase Edge Function deploy failed after 3 attempts."
          exit "$status"
